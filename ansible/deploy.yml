---
- name: Deploy Task Automation CLI
  hosts: webserver

  tasks:

    - name: Pull latest app image from Docker Hub
      community.docker.docker_image:
        name: mohit67/task-automation-cli:latest
        source: pull

    - name: Stop and remove existing app container (if any)
      community.docker.docker_container:
        name: task-cli
        state: absent

    - name: Create custom docker network
      community.docker.docker_network:
        name: task-network

    - name: Ensure MySQL container is running
      community.docker.docker_container:
        name: task-db
        image: mysql:8.0
        state: started
        restart_policy: unless-stopped
        networks:
          - name: task-network
        env:
          MYSQL_ROOT_PASSWORD: "root"
          MYSQL_DATABASE: "taskdb"
        volumes:
          - "{{ playbook_dir }}/../init_db.sql:/init_db.sql:ro"
        ports:
          - "3307:3306"
        detach: true

    - name: Initialize Database Schema
      community.docker.docker_container_exec:
        container: task-db
        command: /bin/bash -c "mysql -uroot -proot taskdb < /init_db.sql"
      ignore_errors: yes # in case tables already exist

    - name: Start app container
      community.docker.docker_container:
        name: task-cli
        image: mohit67/task-automation-cli:latest
        state: started
        restart_policy: unless-stopped
        networks:
          - name: task-network
        env:
          DB_HOST: "task-db"
          DB_USER: "root"
          DB_PASSWORD: "root"
          DB_NAME: "taskdb"
        interactive: true
        tty: true
        detach: true
